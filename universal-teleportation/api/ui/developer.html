<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WekezaOmniOS Developer IDE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-default: #1e1e1e;
            --bg-surface: #252526;
            --bg-inset: #1a1a1a;
            --bg-input: #3c3c3c;
            --text-primary: #cccccc;
            --text-secondary: #8e8e8e;
            --border-default: #333333;
            --border-active: #0e639c;
            --action-primary: #0e639c;
            --action-secondary: #3a3d41;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-default);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .activity-bar {
            width: 50px;
            background-color: var(--bg-surface);
            border-right: 1px solid var(--border-default);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10px;
            gap: 15px;
        }

        .activity-bar i {
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 5px;
            border-radius: 5px;
        }

        .activity-bar i.active, .activity-bar i:hover {
            color: var(--text-primary);
            background-color: var(--action-secondary);
        }

        .sidebar {
            width: 250px;
            background-color: var(--bg-surface);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 10px;
            font-weight: bold;
            border-bottom: 1px solid var(--border-default);
        }

        .file-explorer {
            flex-grow: 1;
            overflow-y: auto;
            padding: 5px;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .editor-tabs {
            display: flex;
            background-color: var(--bg-surface);
        }

        .tab {
            padding: 10px 15px;
            cursor: pointer;
            border-right: 1px solid var(--border-default);
            position: relative;
        }

        .tab.active {
            background-color: var(--bg-default);
            border-bottom: 2px solid var(--border-active);
        }
        
        .tab .close-tab {
            position: absolute;
            top: 50%;
            right: 5px;
            transform: translateY(-50%);
            cursor: pointer;
            display: none;
        }

        .tab:hover .close-tab {
            display: inline;
        }

        .editor-container {
            flex-grow: 1;
            position: relative;
        }

        #editor {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
        }

        .terminal-container {
            height: 30%;
            background-color: var(--bg-inset);
            border-top: 1px solid var(--border-default);
        }

        #terminal {
            width: 100%;
            height: 100%;
        }

        .status-bar {
            height: 25px;
            background-color: var(--action-primary);
            color: white;
            display: flex;
            align-items: center;
            padding: 0 10px;
            font-size: 12px;
        }

        .file-item {
            padding: 5px 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .file-item:hover {
            background-color: var(--action-secondary);
        }

        .file-item i {
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="activity-bar">
        <i class="fas fa-files active" title="Explorer"></i>
        <i class="fas fa-search" title="Search"></i>
        <i class="fas fa-code-branch" title="Source Control"></i>
        <i class="fas fa-play" title="Run and Debug"></i>
        <i class="fas fa-puzzle-piece" title="Extensions"></i>
    </div>
    <div class="sidebar">
        <div class="sidebar-header">EXPLORER</div>
        <div class="file-explorer" id="file-explorer"></div>
    </div>
    <div class="main-content">
        <div class="editor-tabs" id="editor-tabs">
        </div>
        <div class="editor-container">
            <div id="editor"></div>
        </div>
        <div class="terminal-container">
            <div id="terminal"></div>
        </div>
    </div>
    <div class="status-bar">
        <div>main</div>
        <div style="flex-grow: 1;"></div>
        <div>UTF-8</div>
        <div>LF</div>
        <div>JavaScript</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs/loader.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>

    <script>
        let editor;
        let openFiles = {};
        let activeFile = null;

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('editor'), {
                theme: 'vs-dark',
                automaticLayout: true
            });
        });

        const term = new Terminal({
            cursorBlink: true,
            theme: {
                background: '#1a1a1a',
                foreground: '#cccccc'
            }
        });
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal'));
        fitAddon.fit();

        const ws = new WebSocket(`ws://${window.location.host}/ws/terminal`);
        ws.onmessage = (event) => {
            term.write(event.data);
        };
        term.onData((data) => {
            ws.send(data);
        });

        async function listFiles(path = '.') {
            const response = await fetch(`/files/list?path=${encodeURIComponent(path)}`);
            const files = await response.json();
            const explorer = document.getElementById('file-explorer');
            explorer.innerHTML = '';
            
            if (path !== '.') {
                const parentDir = path.substring(0, path.lastIndexOf('/')) || '.';
                explorer.innerHTML += `
                    <div class="file-item" onclick="listFiles('${parentDir}')">
                        <i class="fas fa-arrow-left"></i> ..
                    </div>
                `;
            }

            files.sort((a, b) => {
                if (a.type === b.type) return a.name.localeCompare(b.name);
                return a.type === 'directory' ? -1 : 1;
            });

            for (const file of files) {
                const icon = file.type === 'directory' ? 'fa-folder' : 'fa-file';
                const action = file.type === 'directory' 
                    ? `listFiles('${file.path}')` 
                    : `openFile('${file.path}')`;
                explorer.innerHTML += `
                    <div class="file-item" onclick="${action}">
                        <i class="fas ${icon}"></i> ${file.name}
                    </div>
                `;
            }
        }

        async function openFile(path) {
            if (openFiles[path]) {
                setActiveFile(path);
                return;
            }

            const response = await fetch(`/read?path=${encodeURIComponent(path)}`);
            const content = await response.text();
            
            const newModel = monaco.editor.createModel(content, undefined, monaco.Uri.parse(path));
            openFiles[path] = { model: newModel, state: null };
            
            addTab(path);
            setActiveFile(path);
        }

        function addTab(path) {
            const tabsContainer = document.getElementById('editor-tabs');
            const fileName = path.split('/').pop();
            const tab = document.createElement('div');
            tab.className = 'tab';
            tab.textContent = fileName;
            tab.dataset.path = path;
            tab.onclick = () => setActiveFile(path);

            const closeBtn = document.createElement('span');
            closeBtn.className = 'close-tab';
            closeBtn.innerHTML = '&times;';
            closeBtn.onclick = (e) => {
                e.stopPropagation();
                closeFile(path);
            };
            tab.appendChild(closeBtn);
            tabsContainer.appendChild(tab);
        }

        function setActiveFile(path) {
            if (activeFile) {
                openFiles[activeFile].state = editor.saveViewState();
                document.querySelector(`.tab[data-path="${activeFile}"]`).classList.remove('active');
            }
            
            activeFile = path;
            editor.setModel(openFiles[path].model);
            if (openFiles[path].state) {
                editor.restoreViewState(openFiles[path].state);
            }
            document.querySelector(`.tab[data-path="${path}"]`).classList.add('active');
            editor.focus();
        }

        function closeFile(path) {
            const tab = document.querySelector(`.tab[data-path="${path}"]`);
            tab.remove();

            openFiles[path].model.dispose();
            delete openFiles[path];

            if (activeFile === path) {
                const remainingTabs = document.querySelectorAll('.tab');
                if (remainingTabs.length > 0) {
                    setActiveFile(remainingTabs[0].dataset.path);
                } else {
                    editor.setModel(null);
                    activeFile = null;
                }
            }
        }

        window.addEventListener('resize', () => {
            fitAddon.fit();
        });

        listFiles();
    </script>
</body>
</html>
